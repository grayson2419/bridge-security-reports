name: Bridge Security Monitor

"on":
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install anthropic requests

      - name: Run bridge monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/bridge_monitor.py

      - name: Commit reports
        run: |
          git config user.email "bridge-bot@bnbchain.org"
          git config user.name "Bridge Security Bot"
          git add reports/
          if ! git diff --staged --quiet; then
            git commit -m "security: add bridge incident reports $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new reports to commit"
          fi
